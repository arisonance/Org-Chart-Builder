name: Deploy test build to GitHub Pages

on:
  push:
    branches: [claude/keen-archimedes-95vxq4]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Server routes can't ship in a static export; the app's fetches to
      # them fail soft (localStorage remains the source of truth).
      - run: rm -rf src/app/api
      - run: npm run build
        env:
          STATIC_EXPORT: "1"
      # Publish the static build to the gh-pages branch (adds .nojekyll so
      # the _next asset directory is served).
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
